<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Bot States — Animated</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a14;
    display: flex;
    gap: 48px;
    padding: 60px 40px;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
  }

  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.5;
    color: #aac;
  }

  /* ─── OFFLINE: flicker estático ─── */
  .bot-offline {
    animation: static-flicker 8s infinite;
  }
  @keyframes static-flicker {
    0%, 95%, 100%  { opacity: 1; filter: none; }
    96%            { opacity: 0.7; filter: brightness(0.6) contrast(1.4); }
    97%            { opacity: 1;   filter: none; }
    98%            { opacity: 0.5; filter: brightness(0.4); }
    99%            { opacity: 1;   filter: none; }
  }

  /* ─── OFFLINE: ojos pulsan débilmente ─── */
  .eye-dead {
    animation: dead-eye 5s ease-in-out infinite;
  }
  @keyframes dead-eye {
    0%, 80%, 100% { opacity: 0.35; }
    40%           { opacity: 0.7; filter: drop-shadow(0 0 2px #555); }
  }

  /* ─── LOADING: robot sube/baja levemente ─── */
  .bot-loading {
    animation: bob 2s ease-in-out infinite;
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-4px); }
  }

  /* ─── LOADING: glow exterior ─── */
  .orbit-glow {
    animation: orbit-spin 2s linear infinite;
    transform-origin: 80px 80px;
  }
  .orbit-glow-2 {
    animation: orbit-spin 2s linear infinite reverse;
    transform-origin: 80px 80px;
    animation-delay: -0.75s;
  }

  /* ─── LOADING: scanline interior ─── */
  .scan-line {
    animation: scan 2s linear infinite;
  }
  @keyframes scan {
    0%   { transform: translateY(-20px); opacity: 0; }
    20%  { opacity: 0.6; }
    80%  { opacity: 0.6; }
    100% { transform: translateY(20px);  opacity: 0; }
  }

  /* ─── DONE: robot respira lento ─── */
  .bot-done {
    animation: breathe 3.5s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.025); }
  }

  /* ─── DONE: zzz flotan ─── */
  .zzz1 { animation: float-z 3s ease-in-out infinite; }
  .zzz2 { animation: float-z 3s ease-in-out infinite 0.6s; }
  .zzz3 { animation: float-z 3s ease-in-out infinite 1.2s; }
  @keyframes float-z {
    0%   { transform: translate(0, 0); opacity: 0.7; }
    100% { transform: translate(6px, -14px); opacity: 0; }
  }

  /* ─── DONE: check glow pulsa ─── */
  .check-glow {
    animation: pulse-check 2s ease-in-out infinite;
  }
  @keyframes pulse-check {
    0%, 100% { opacity: 0.12; r: 68; }
    50%      { opacity: 0.3; r: 72; }
  }

  /* ─── PAUSA: barras laten ─── */
  .pause-bar-l { animation: bar-beat 1.2s ease-in-out infinite; }
  .pause-bar-r { animation: bar-beat 1.2s ease-in-out infinite 0.15s; }
  @keyframes bar-beat {
    0%, 100% { transform: scaleY(1); opacity: 0.9; }
    50%      { transform: scaleY(0.7); opacity: 0.5; }
  }

  /* ─── PAUSA: anillo orbita ─── */
  .pause-ring {
    animation: ring-spin 4s linear infinite;
    transform-origin: 40px 40px;
  }

  /* ─── Partículas LOADING ─── */
  .particle { animation: particle-fly var(--dur) ease-out infinite var(--delay); }
  @keyframes particle-fly {
    0%   { transform: translate(0,0) scale(1); opacity: 0.8; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
  }

  /* ─── OFFLINE: noiseline horizontal ─── */
  .noise-line { animation: noise 0.15s steps(1) infinite; }
  @keyframes noise {
    0%  { d: path("M44 95 L116 95"); opacity: 0.1; }
    25% { d: path("M44 93 L116 97"); opacity: 0.2; }
    50% { d: path("M44 96 L116 94"); opacity: 0.15; }
    75% { d: path("M44 94 L116 96"); opacity: 0.1; }
  }

  @keyframes orbit-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* ─── ESPERANDO: robot flota suave ─── */
  .bot-waiting {
    animation: float-wait 3s ease-in-out infinite;
  }
  @keyframes float-wait {
    0%, 100% { transform: translateY(0px); }
    50%      { transform: translateY(-5px); }
  }

  /* ─── ESPERANDO: anillo pulsa lento ─── */
  .wait-ring-outer {
    animation: wait-pulse-ring 2.5s ease-in-out infinite;
    transform-origin: 80px 80px;
  }
  @keyframes wait-pulse-ring {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50%      { opacity: 0.5; transform: scale(1.03); }
  }

  /* ─── ESPERANDO: icono persona sube/baja ─── */
  .person-icon {
    animation: person-bob 2s ease-in-out infinite;
  }
  @keyframes person-bob {
    0%, 100% { transform: translateY(0); opacity: 0.9; }
    50%      { transform: translateY(-3px); opacity: 1; }
  }

  /* ─── ESPERANDO: flecha pulsa ─── */
  .arrow-ping {
    animation: arrow-pulse 1.5s ease-in-out infinite;
  }
  @keyframes arrow-pulse {
    0%, 100% { opacity: 0.3; transform: translateX(0); }
    50%      { opacity: 1; transform: translateX(3px); }
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════
     BOT OFFLINE
════════════════════════════════════════ -->
<div class="card">
  <svg class="bot-offline" width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="bg_off" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#1e1e30"/>

        <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
        <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
        <feBlend in="SourceGraphic" in2="gray" mode="overlay" result="blend"/>
        <feComposite in="blend" in2="SourceGraphic" operator="in"/>

    <circle cx="80" cy="80" r="75" fill="url(#bg_off)" stroke="#22223a" stroke-width="1.5"/>

    <rect x="44" y="68" width="72" height="52" rx="10" fill="#181828" stroke="#2a2a42" stroke-width="1.5"/>
    <rect x="52" y="38" width="56" height="38" rx="9" fill="#181828" stroke="#2a2a42" stroke-width="1.5"/>

    <line x1="80" y1="38" x2="80" y2="26" stroke="#2a2a42" stroke-width="2" stroke-linecap="round"/>

      <line x1="98" y1="52" x2="90" y2="60" stroke="#3a3a5a" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <path d="M 67 73 Q 80 69 93 73" stroke="#2a2a44" stroke-width="1.8" fill="none" stroke-linecap="round"/>

    <rect x="54" y="82" width="52" height="26" rx="5" fill="#111120" stroke="#202038" stroke-width="1"/>

    <circle cx="66" cy="95" r="5" fill="#0e0e1e" stroke="#222" stroke-width="1"/>
    <circle cx="80" cy="95" r="5" fill="#0e0e1e" stroke="#222" stroke-width="1"/>
    <circle cx="94" cy="95" r="5" fill="#0e0e1e" stroke="#222" stroke-width="1"/>

    <rect x="55" y="90" width="50" height="1" fill="#4040ff" opacity="0.06">
      <animate attributeName="y" values="83;107;83" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.12;0" dur="3s" repeatCount="indefinite"/>
    </rect>

    <rect x="26" y="74" width="18" height="10" rx="5" fill="#181828" stroke="#2a2a42" stroke-width="1.5" transform="rotate(20 35 79)"/>
    <rect x="116" y="74" width="18" height="10" rx="5" fill="#181828" stroke="#2a2a42" stroke-width="1.5" transform="rotate(-20 125 79)"/>

    <text x="80" y="138" text-anchor="middle" fill="#2a2a44" font-size="10" font-family="monospace" font-weight="bold" letter-spacing="2">OFFLINE</text>
    <rect x="103" y="129" width="6" height="8" fill="#2a2a44">
      <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </svg>
  <span class="label">Offline</span>
</div>

    <g style="transform-origin: 29px 40px">
      <rect class="pause-bar-l" x="22" y="22" width="12" height="36" rx="4"

    </g>
    <g>
      <rect class="pause-bar-r" x="46" y="22" width="12" height="36" rx="4"
            fill="#ffaa00" filter="url(#glow_amber)" style="transform-origin: 52px 40px"/>
    </g>
  </svg>
  <span class="label">Pausa</span>
</div>


<!-- ═══════════════════════════════════════
     ESPERANDO USUARIO  ← NUEVO
════════════════════════════════════════ -->
<div class="card">
  <svg class="bot-waiting" width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="bg_wait" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#1a0e30"/>
        <stop offset="100%" stop-color="#0c0718"/>
      </radialGradient>
      <radialGradient id="eye_wait" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#cc88ff"/>
        <stop offset="100%" stop-color="#7722cc"/>
      </radialGradient>
      <filter id="glow_purple" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="3.5" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow_purple_soft" x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur stdDeviation="2" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- Fondo -->
    <circle cx="80" cy="80" r="75" fill="url(#bg_wait)" stroke="#3a1a6a" stroke-width="1.5"/>

    <!-- Anillo exterior pulsante -->
    <circle class="wait-ring-outer" cx="80" cy="80" r="71" fill="none" stroke="#9944ff"
            stroke-width="1.5" stroke-dasharray="18 14" stroke-linecap="round" opacity="0.35"/>

    <!-- Anillo medio girando despacio -->
    <circle cx="80" cy="80" r="65" fill="none" stroke="#6622cc" stroke-width="0.8"
            stroke-dasharray="8 18" opacity="0.25">
      <animateTransform attributeName="transform" type="rotate" from="0 80 80" to="360 80 80" dur="16s" repeatCount="indefinite"/>
    </circle>

    <!-- Partícula orbital -->
    <circle cx="80" cy="9" r="2.5" fill="#bb66ff" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="0 80 80" to="360 80 80" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="9" r="1.5" fill="#9933ff" opacity="0.5">
      <animateTransform attributeName="transform" type="rotate" from="200 80 80" to="560 80 80" dur="5s" repeatCount="indefinite"/>
    </circle>

    <!-- Cuerpo robot -->
    <rect x="44" y="68" width="72" height="52" rx="10" fill="#160d28" stroke="#4a1a9a" stroke-width="1.5"/>
    <!-- Cabeza -->
    <rect x="52" y="38" width="56" height="38" rx="9" fill="#160d28" stroke="#4a1a9a" stroke-width="1.5"/>

    <!-- Antena parpadeante -->
    <line x1="80" y1="38" x2="80" y2="26" stroke="#9944ff" stroke-width="2" stroke-linecap="round"/>
    <circle cx="80" cy="23" r="4" fill="#5a18bb" stroke="#aa55ff" stroke-width="1" filter="url(#glow_purple)">
      <animate attributeName="r" values="4;5.5;4" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Ojos: grandes, curiosos, con "?" pupila -->
    <!-- Ojo izquierdo -->
    <circle cx="66" cy="56" r="8" fill="url(#eye_wait)" filter="url(#glow_purple_soft)">
      <animate attributeName="opacity" values="1;0.6;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <text x="63" y="60" fill="#fff" font-size="9" font-family="monospace" font-weight="bold" opacity="0.9">?</text>

    <!-- Ojo derecho -->
    <circle cx="94" cy="56" r="8" fill="url(#eye_wait)" filter="url(#glow_purple_soft)">
      <animate attributeName="opacity" values="1;0.6;1" dur="3s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <text x="91" y="60" fill="#fff" font-size="9" font-family="monospace" font-weight="bold" opacity="0.9">?</text>

    <!-- Boca: línea recta con parpadeo "esperando" -->
    <path d="M 68 71 Q 80 74 92 71" stroke="#7733cc" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Panel pecho -->
    <rect x="54" y="82" width="52" height="26" rx="5" fill="#0e0718" stroke="#3a1070" stroke-width="1"/>

    <!-- Icono de persona humana en el panel -->
    <g class="person-icon">
      <!-- Cabeza persona -->
      <circle cx="80" cy="89" r="5" fill="none" stroke="#aa55ff" stroke-width="1.5" filter="url(#glow_purple_soft)"/>
      <!-- Cuerpo persona -->
      <path d="M 72 103 Q 72 96 80 96 Q 88 96 88 103" fill="none" stroke="#aa55ff" stroke-width="1.5"
            stroke-linecap="round" filter="url(#glow_purple_soft)"/>
    </g>

    <!-- Brazos levantados (postura de pregunta/espera) -->
    <rect x="26" y="68" width="18" height="10" rx="5" fill="#160d28" stroke="#4a1a9a" stroke-width="1.5"
          transform="rotate(-25 35 73)"/>
    <rect x="116" y="68" width="18" height="10" rx="5" fill="#160d28" stroke="#4a1a9a" stroke-width="1.5"
          transform="rotate(25 125 73)"/>

    <!-- Flechas apuntando al ícono de usuario (arriba del robot) -->
    <!-- Flecha izquierda -->
    <g class="arrow-ping">
      <path d="M 108 38 L 114 32 L 120 38" stroke="#aa55ff" stroke-width="1.5" fill="none"
            stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
      <line x1="114" y1="32" x2="114" y2="46" stroke="#aa55ff" stroke-width="1.5"
            stroke-linecap="round" opacity="0.8"/>
    </g>

    <!-- Burbuja de chat flotando arriba-derecha -->
    <g>
      <rect x="106" y="14" width="38" height="20" rx="5" fill="#2a0e50" stroke="#8833dd" stroke-width="1"
            opacity="0.85">
        <animate attributeName="opacity" values="0.85;0.4;0.85" dur="2s" repeatCount="indefinite"/>
      </rect>
      <!-- Pico de burbuja -->
      <path d="M 116 34 L 112 40 L 122 34" fill="#2a0e50" stroke="#8833dd" stroke-width="1"
            stroke-linejoin="round" opacity="0.85">
        <animate attributeName="opacity" values="0.85;0.4;0.85" dur="2s" repeatCount="indefinite"/>
      </path>
      <!-- Puntos dentro de la burbuja (typing indicator) -->
      <circle cx="116" cy="24" r="2" fill="#cc77ff">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" begin="0s" repeatCount="indefinite"/>
        <animate attributeName="r" values="2;2.8;2" dur="1.2s" begin="0s" repeatCount="indefinite"/>
      </circle>
      <circle cx="125" cy="24" r="2" fill="#cc77ff">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" begin="0.4s" repeatCount="indefinite"/>
        <animate attributeName="r" values="2;2.8;2" dur="1.2s" begin="0.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="134" cy="24" r="2" fill="#cc77ff">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" begin="0.8s" repeatCount="indefinite"/>
        <animate attributeName="r" values="2;2.8;2" dur="1.2s" begin="0.8s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Label -->
    <text x="80" y="136" text-anchor="middle" fill="#5a1a9a" font-size="8.5" font-family="monospace"
          font-weight="bold" letter-spacing="1.5">ESPERANDO</text>
    <!-- Cursor parpadeante al final -->
    <rect x="112" y="128" width="5" height="7" rx="1" fill="#9944ff" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0;0.7" dur="1s" repeatCount="indefinite"/>
    </rect>
  </svg>
  <span class="label">Esperando usuario</span>
</div>

</body>
</html>
